<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#4b0082;
  color:white;
  text-align:center;
}

/* TOP */
.topBtns{
  display:flex;
  justify-content:space-around;
  margin:10px;
}
.icon{width:40px;}
.topBtn{
  padding:6px 12px;
  border-radius:20px;
  background:linear-gradient(purple,pink);
}
.cash{
  background:gold;
  color:black;
}

/* BALANCE */
.balance{font-size:28px;}

/* WHEEL */
.wheelBox{
  width:280px;
  height:280px;
  margin:20px auto;
  position:relative;
}

.wheel{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
  transition: transform 4s ease-out;
}

/* CENTER */
.center{
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:80px; height:80px;
  border-radius:50%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

/* BUTTON */
.btn{
  padding:8px 12px;
  border-radius:20px;
  background:orange;
  margin:5px;
}
</style>
</head>

<body>

<div class="topBtns">
  <div>
    <img src="https://cdn-icons-png.flaticon.com/512/2583/2583344.png" class="icon"><br>
    <div class="topBtn">Rank</div>
  </div>

  <div>
    <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="icon"><br>
    <div class="topBtn">Invitation</div>
  </div>

  <div>
    <img src="https://cdn-icons-png.flaticon.com/512/2331/2331943.png" class="icon"><br>
    <div class="topBtn cash">Cash Out</div>
  </div>
</div>

<div class="balance">₹<span id="bal">0</span></div>

<div class="wheelBox">

  <!-- ✅ WORKING WHEEL IMAGE -->
  <img id="wheel" class="wheel"
  src="https://i.imgur.com/6o5VQwB.png">

  <div class="center" onclick="spin()">
    <span id="spins">3</span>
    <small>Spins</small>
  </div>

</div>

<button class="btn" onclick="join()">+1 Spin</button>
<button class="btn" onclick="more()">More</button>

<script>
let balance=0, spins=3, spinCount=0, rotate=0;

function update(){
  document.getElementById("bal").innerText=balance;
  document.getElementById("spins").innerText=spins;
}

function spin(){
  if(spins<=0){
    alert("No spins");
    return;
  }

  spins--;
  spinCount++;

  let win;

  // ✅ FIXED RANDOM
  if(spinCount==1){
    win=Math.floor(Math.random()*31)+150; // 150-180
  }else if(spinCount==2){
    win=Math.floor(Math.random()*10)+1;
  }else{
    win=Math.floor(Math.random()*5)+1;
  }

  balance+=win;

  rotate += 1440 + Math.floor(Math.random()*360);

  document.getElementById("wheel").style.transform =
    "rotate("+rotate+"deg)";

  setTimeout(()=>{
    alert("Won ₹"+win);
    update();
  },4000);
}

// ✅ FIXED JOIN (no block)
function join(){
  if(localStorage.getItem("join")){
    alert("Already claimed");
    return;
  }

  location.href="https://t.me/+fo5RTULOJ3c5N2Q9";

  spins++;
  localStorage.setItem("join","yes");
}

// MORE
function more(){
  alert("Coming soon...");
}

update();
</script>

</body>
</html>
