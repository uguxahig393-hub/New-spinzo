<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin & Earn</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#6a11cb,#2d014d);
  color:white;
  text-align:center;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

/* TOP BUTTONS */
.topBtns{
  display:flex;
  justify-content:space-around;
  margin-top:10px;
}

.topItem{
  text-align:center;
}

.emoji{
  font-size:22px;
  display:block;
}

.btn{
  background: linear-gradient(45deg,#ff9800,#ff5722);
  border:none;
  padding:8px 14px;
  border-radius:20px;
  color:white;
  margin-top:5px;
}

/* BALANCE */
.balance{
  font-size:28px;
  margin-top:10px;
}

/* PROGRESS */
.progressBox{
  width:85%;
  margin:auto;
  background:#aaa;
  border-radius:20px;
}
.progress{
  height:10px;
  width:0%;
  background:linear-gradient(orange,yellow);
  border-radius:20px;
}

/* POINTER */
.pointer{
  width:0;
  height:0;
  border-left:12px solid transparent;
  border-right:12px solid transparent;
  border-bottom:25px solid gold;
  margin:auto;
  margin-top:10px;
}

/* WHEEL */
.wheelBox{
  width:90vw;
  max-width:320px;
  aspect-ratio:1/1;
  margin:20px auto;
  position:relative;
}

.wheel{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
  transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
}

/* CENTER BUTTON (SPIN HERE) */
.centerCircle{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:85px;
  height:85px;
  border-radius:50%;
  background: radial-gradient(#333,#000);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  box-shadow:0 0 20px gold;
  font-size:18px;
  cursor:pointer;
}

.centerCircle span{
  font-size:22px;
  font-weight:bold;
}

.centerCircle small{
  font-size:12px;
  opacity:0.7;
}

/* SIDE BUTTONS */
.sideBtn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
}

.leftBtn{ left:-10px; }
.rightBtn{ right:-10px; }

/* INVITE */
.invite{
  margin-top:20px;
  padding:12px;
  background:linear-gradient(45deg,purple,pink);
  border-radius:20px;
}

/* POPUP */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.popupBox{
  background:linear-gradient(#6a11cb,#2d014d);
  padding:20px;
  border-radius:20px;
}
</style>
</head>

<body>

<div class="header">
  <div>❌</div>
  <div>Spin & Earn</div>
  <div>⋮</div>
</div>

<!-- TOP BUTTONS WITH EMOJI -->
<div class="topBtns">
  <div class="topItem">
    <span class="emoji">🏆</span>
    <button class="btn">Rank</button>
  </div>

  <div class="topItem">
    <span class="emoji">👬</span>
    <button class="btn">Invitation</button>
  </div>

  <div class="topItem">
    <span class="emoji">🪙</span>
    <button class="btn">Cash Out</button>
  </div>
</div>

<div class="balance">₹<span id="bal">0</span></div>

<div class="progressBox">
  <div class="progress" id="progress"></div>
</div>
<p id="leftText"></p>

<div class="pointer"></div>

<div class="wheelBox">
  <img id="wheel" class="wheel"
  src="https://res.cloudinary.com/dtz0urit6/image/upload/f_png,q_auto/cloudinary-tools-uploads/uqph2c4zajuzbgwookv3.png">

  <!-- CLICK TO SPIN -->
  <div class="centerCircle" onclick="spin()">
    <span id="spins">3</span>
    <small>Spins</small>
  </div>

  <button class="btn sideBtn leftBtn" onclick="refer()">+1 Spin</button>
  <button class="btn sideBtn rightBtn">More</button>
</div>

<!-- INVITE -->
<div class="invite">
  Invite for Spins!<br><br>
  <button class="btn" onclick="copyLink()">Copy Link</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popupBox">
    <h2>Super Win!</h2>
    <h1>₹<span id="winAmt"></span></h1>
    <button class="btn" onclick="closePop()">GO ON</button>
  </div>
</div>

<script>
let balance = 0;
let spins = 3;
let spinCount = 0;

function updateUI(){
  document.getElementById("bal").innerText = balance;
  document.getElementById("spins").innerText = spins;

  let percent = (balance / 250) * 100;
  if(percent > 100) percent = 100;

  document.getElementById("progress").style.width = percent + "%";

  let left = 250 - balance;
  if(left < 0) left = 0;

  document.getElementById("leftText").innerText =
    "Only ₹" + left + " to cash out ₹250!";
}

function spin(){
  if(spins <= 0){
    alert("No spins left!");
    return;
  }

  spins--;
  spinCount++;

  let win = 0;

  if(spinCount == 1){
    win = 160;
  } else if(spinCount == 2){
    win = Math.floor(Math.random()*10)+1;
  } else {
    win = Math.floor(Math.random()*5)+1;
  }

  balance += win;

  let deg = 1440 + Math.floor(Math.random() * 360);
  document.getElementById("wheel").style.transform =
    "rotate(" + deg + "deg)";

  setTimeout(()=>{
    document.getElementById("popup").style.display = "flex";
    document.getElementById("winAmt").innerText = win;
    updateUI();
  }, 4000);
}

function closePop(){
  document.getElementById("popup").style.display = "none";
}

function refer(){
  spins++;
  alert("+1 Spin Added");
  updateUI();
}

function copyLink(){
  navigator.clipboard.writeText(window.location.href);
  alert("Link Copied!");
}

updateUI();
</script>

</body>
</html>
