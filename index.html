<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin & Earn</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#6a11cb,#2d014d);
  color:white;
  text-align:center;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  font-weight:bold;
}

/* BUTTON */
.btn{
  background: linear-gradient(45deg,#ff9800,#ff5722);
  border:none;
  padding:8px 14px;
  border-radius:20px;
  color:white;
}

/* BALANCE */
.balance{
  font-size:30px;
  margin-top:10px;
}

/* PROGRESS */
.progressBox{
  width:85%;
  margin:auto;
  background:#aaa;
  border-radius:20px;
}
.progress{
  height:10px;
  width:0%;
  background:linear-gradient(orange,yellow);
  border-radius:20px;
}

/* WHEEL */
.wheelBox{
  position:relative;
  margin-top:20px;
}

.wheel{
  width:280px;
  height:280px;
  border-radius:50%;
  margin:auto;
  transition:transform 4s ease-out;
}

/* POINTER */
.pointer{
  width:0;
  height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:30px solid gold;
  margin:auto;
}

/* CENTER */
.centerCircle{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:black;
  border-radius:50%;
  width:80px;
  height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 15px gold;
}

/* SIDE BUTTONS */
.sideBtn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
}

.leftBtn{ left:5px; }
.rightBtn{ right:5px; }

/* INVITE */
.invite{
  margin-top:20px;
  padding:12px;
  background:linear-gradient(45deg,purple,pink);
  border-radius:20px;
}

/* POPUP */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.popupBox{
  background:linear-gradient(#6a11cb,#2d014d);
  padding:20px;
  border-radius:20px;
}

</style>
</head>

<body>

<div class="header">
  <div>❌</div>
  <div>Spin & Earn</div>
  <div>⋮</div>
</div>

<div>
  <button class="btn">Rank</button>
  <button class="btn">Invitation</button>
  <button class="btn">Cash Out</button>
</div>

<div class="balance">₹<span id="bal">0</span></div>

<div class="progressBox">
  <div class="progress" id="progress"></div>
</div>
<p id="left"></p>

<div class="pointer"></div>

<div class="wheelBox">

  <!-- WHEEL IMAGE -->
  <img id="wheel" class="wheel"
  src="https://i.imgur.com/6o5VQwB.png">

  <div class="centerCircle">
    <span id="spins">3</span>
  </div>

  <button class="btn sideBtn leftBtn" onclick="refer()">+1 Spin</button>
  <button class="btn sideBtn rightBtn">More</button>

</div>

<br>
<button class="btn" onclick="spin()">SPIN</button>

<div class="invite">
  Invite for Spins!
  <br><br>
  <button class="btn" onclick="copy()">Copy Link</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popupBox">
    <h2>Super Win!</h2>
    <h1>₹<span id="winAmt"></span></h1>
    <button class="btn" onclick="closePop()">GO ON</button>
  </div>
</div>

<script>
let balance=0, spins=3, spinCount=0;

function update(){
  document.getElementById("bal").innerText=balance;
  document.getElementById("spins").innerText=spins;

  let p=(balance/250)*100;
  if(p>100)p=100;
  document.getElementById("progress").style.width=p+"%";

  document.getElementById("left").innerText=
  "Only ₹"+(250-balance)+" to cash out ₹250!";
}

function spin(){
  if(spins<=0){ alert("No spins"); return; }

  spins--; spinCount++;

  let win=0;
  if(spinCount==1) win=160;
  else if(spinCount==2) win=Math.floor(Math.random()*10)+1;
  else win=Math.floor(Math.random()*5)+1;

  balance+=win;

  let deg=720+Math.random()*360;
  document.getElementById("wheel").style.transform=
  "rotate("+deg+"deg)";

  setTimeout(()=>{
    document.getElementById("popup").style.display="flex";
    document.getElementById("winAmt").innerText=win;
    update();
  },4000);
}

function closePop(){
  document.getElementById("popup").style.display="none";
}

function refer(){
  spins++;
  alert("+1 Spin");
  update();
}

function copy(){
  navigator.clipboard.writeText(location.href);
  alert("Link Copied!");
}

update();
</script>

</body>
</html>
