<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#6a11cb,#2d014d);
  color:white;
  text-align:center;
}

/* TOP */
.topBtns{
  display:flex;
  justify-content:space-around;
  margin-top:10px;
}
.icon{width:45px;}
.topBtn{
  padding:8px 15px;
  border-radius:20px;
  background:linear-gradient(purple,pink);
}
.cash{
  background:gold;
  color:black;
}

/* BALANCE */
.balance{
  font-size:28px;
  margin-top:10px;
}

/* PROGRESS */
.progressBox{
  width:85%;
  margin:auto;
  background:#aaa;
  border-radius:20px;
}
.progress{
  height:10px;
  width:0%;
  background:linear-gradient(orange,yellow);
  border-radius:20px;
}

/* TEXT */
.leftText{
  margin-top:8px;
}

/* POINTER */
.pointer{
  width:0;
  height:0;
  border-left:12px solid transparent;
  border-right:12px solid transparent;
  border-bottom:25px solid yellow;
  margin:10px auto;
}

/* WHEEL FIX */
.wheelBox{
  width:280px;
  height:280px;
  margin:20px auto;
  position:relative;
}

.wheel{
  width:100%;
  height:100%;
  border-radius:50%;
  background-image:url("wheel.jpg");
  background-size:contain;   /* 🔥 main fix */
  background-position:center;
  background-repeat:no-repeat;
  transition: transform 4s ease-out;
  background-color:black;    /* optional gap fill */
}

/* CENTER */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80px;
  height:80px;
  background:black;
  border-radius:50%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

/* BUTTON */
.btn{
  padding:10px 20px;
  border-radius:20px;
  background:orange;
  margin:5px;
}

/* INVITE */
.bigInvite{
  margin:20px;
  padding:15px;
  background:linear-gradient(45deg,purple,pink);
  border-radius:20px;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topBtns">
  <div>
    <img src="https://cdn-icons-png.flaticon.com/512/2583/2583344.png" class="icon"><br>
    <div class="topBtn">Rank</div>
  </div>

  <div>
    <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="icon"><br>
    <div class="topBtn">Invitation</div>
  </div>

  <div>
    <img src="https://cdn-icons-png.flaticon.com/512/2331/2331943.png" class="icon"><br>
    <div class="topBtn cash">Cash Out</div>
  </div>
</div>

<!-- BALANCE -->
<div class="balance">₹<span id="bal">0</span></div>

<div class="progressBox">
  <div class="progress" id="progress"></div>
</div>

<p class="leftText" id="leftText"></p>

<div class="pointer"></div>

<!-- WHEEL -->
<div class="wheelBox">
  <div id="wheel" class="wheel"></div>

  <div class="center" onclick="spin()">
    <span id="spins">3</span>
    <small>Spins</small>
  </div>
</div>

<button class="btn" onclick="join()">+1 Spin</button>
<button class="btn" onclick="more()">More</button>

<div class="bigInvite">
  <h3>Invite for Spins!</h3>
  <button class="btn" onclick="copyLink()">Copy Link</button>
</div>

<script>
let balance=0, spins=3, spinCount=0, rotate=0;

function update(){
  document.getElementById("bal").innerText=balance;
  document.getElementById("spins").innerText=spins;

  let percent=(balance/250)*100;
  if(percent>100) percent=100;
  document.getElementById("progress").style.width=percent+"%";

  let left = 250 - balance;

  if(left <= 0){
    document.getElementById("leftText").innerText =
    "🎉 You can withdraw now!";
  }else{
    document.getElementById("leftText").innerText =
    "Only ₹"+Math.ceil(left)+" to cash out ₹250!";
  }
}

function spin(){
  if(spins<=0){ alert("No spins"); return; }

  spins--; spinCount++;

  let win;
  if(spinCount==1){
    win=Math.floor(Math.random()*31)+150;
  }else if(spinCount==2){
    win=Math.floor(Math.random()*10)+1;
  }else{
    win=Math.floor(Math.random()*5)+1;
  }

  balance+=win;

  rotate += 1440 + Math.floor(Math.random()*360);

  document.getElementById("wheel").style.transform =
  "rotate("+rotate+"deg)";

  setTimeout(()=>{
    alert("You won ₹"+win);
    update();
  },4000);
}

function join(){
  if(localStorage.getItem("join")){
    alert("Already claimed");
    return;
  }
  localStorage.setItem("join","yes");
  location.href="https://t.me/+fo5RTULOJ3c5N2Q9";
}

function more(){
  alert("Coming soon...");
}

function copyLink(){
  navigator.clipboard.writeText(location.href);
  alert("Copied!");
}

update();
</script>

</body>
</html>
